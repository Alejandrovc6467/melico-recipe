title: "Centros Cívicos por la Paz (CCP)"
intro: >-
  El Taller Nacional de Danza cuenta actualmente con una oferta consolidada en los
  Centros Cívicos Por la Paz, este programa busca la inclusión social basada en la
  participación adolescente como pilar en la prevención de la violencia y el desarrollo
  de una cultura de paz.

